apiVersion: apps/v1
kind: Deployment
metadata:
  name: fit-deploy
  namespace: vignesh-ns
  labels:
    app: fit

spec:
  replicas: 8
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  selector:
    matchLabels:
      app: fit
  
  template:
    metadata:
      labels:
        app: fit
    spec:
      containers:
        - name: fit-cont
          image: muralisocial123/fitness-app:v1.0.1
          ports:
            - containerPort: 3000
      