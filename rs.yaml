apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: ey-cart-rs
  namespace: vignesh-ns
  labels:
    app: cart

spec: #it behaviour of the replica set 
  replicas: 3
  selector: 
    matchLabels:
      app: web
  template: # it contains pod definition
    metadata:
      labels:
        app: web
    spec: #it contains container definition
      - name: ey-cart-containers
        image: muralisocial123/ey-cart:v1.1.0


